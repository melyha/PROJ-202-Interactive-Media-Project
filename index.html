    // ── CREATE — gym level sandbox ─────────────────────────
    function create() {
      const T = 64;
      const WORLD_W = 1600;
      const WORLD_H = 900;

      // Expand physics world to match level size
      // (default is canvas size — player would stop at 1280×720 otherwise)
      this.physics.world.setBounds(0, 0, WORLD_W, WORLD_H);

      // Background is the solid #1a1a2e set in Phaser config — no tileSprite

      // ── Static groups ──────────────────────────────────────
      // Separate groups allow future per-layer logic (e.g. one-way platforms,
      // hazard tiles) without touching ground collision.
      groundLayer = this.physics.add.staticGroup();
      platformsGroup = this.physics.add.staticGroup();

      // place(group, cx, cy, key) — places one tile by its pixel centre
      const place = (group, cx, cy, key) => {
        const s = group.create(cx, cy, key);
        s.refreshBody();
      };

      // platform(x, y, count) — places a floating ledge into platformsGroup.
      // x = left pixel edge of first tile, y = tile centre, count = tile count.
      const platform = (x, y, count) => {
        for (let i = 0; i < count; i++) {
          const cx = x + 32 + i * T;
          const key = i === 0 ? 'terrain_purple_horizontal_left'
            : i === count - 1 ? 'terrain_purple_horizontal_right'
              : 'terrain_purple_horizontal_middle';
          place(platformsGroup, cx, y, key);
        }
      };

      // ── Ground — y = WORLD_H - T/2 = 900 - 32 = 868 ──────
      // Tile centre at 868 → top surface at 836, bottom surface at 900.
      // Sits flush at the world bottom — no visible gap below.
      const GY = WORLD_H - T / 2;   // 868
      place(groundLayer, 32, GY, 'terrain_purple_block_top_left');
      for (let i = 1; i <= 23; i++) place(groundLayer, 32 + i * T, GY, 'terrain_purple_block_top');
      place(groundLayer, 32 + 24 * T, GY, 'terrain_purple_block_top_right');

      // ── Floating platforms (left-edge x, centre y, tile count) ──
      platform(200, 650, 4);   // A — low jump test
      platform(450, 500, 4);   // B — medium jump test
      platform(750, 380, 3);   // C — high jump test
      platform(1050, 500, 4);   // D — descend test
      platform(1300, 650, 4);   // E — return path

      // Player — 96×128 femaleAdventurer spritesheet, displayed at 0.75 scale → 72×96px.
      //
      // Body math (Phaser applies scale to setSize args):
      //   body.width   = sourceW  * 0.75 = 56  * 0.75 = 42px
      //   body.height  = sourceH  * 0.75 = 104 * 0.75 = 78px
      //   body.x       = x - 36 + offsetX * 0.75  → centered on sprite
      //   body.bottom  = y - 48 + (offsetY + sourceH) * 0.75
      //                = y - 48 + 128 * 0.75 = y + 48  ← exact sprite bottom
      //
      // Constraint: offsetY + sourceH = frameH (128) ensures feet land on surfaces.
      // offsetY = 24 excludes the head (~18px world); offsetX = 20 centers the body.
      //
      // Spawn y: ground surface = GY - 32 = 836. body.bottom = y + 48.
      // y = 836 - 48 = 788 places player standing exactly on ground at start.
      player = this.physics.add.sprite(100, 788, 'player');
      player.setScale(0.75);
      player.body.setSize(56, 104);  // frame-space: 42×78px world
      player.body.setOffset(20, 24); // center X; push body down past head
      player.setCollideWorldBounds(true);

      // Separate colliders — one per layer
      this.physics.add.collider(player, groundLayer);
      this.physics.add.collider(player, platformsGroup);

      // ── Animations — frame indices from assets.json spritesheets[0].animGroups ──
      this.anims.create({
        key: 'idle',
        frames: this.anims.generateFrameNumbers('player', { frames: [0] }),
        frameRate: 4,
        repeat: -1
      });
      this.anims.create({
        key: 'run',
        frames: this.anims.generateFrameNumbers('player', { frames: [24, 25, 26] }),
        frameRate: 12,
        repeat: -1
      });
      this.anims.create({
        key: 'jump',
        frames: this.anims.generateFrameNumbers('player', { frames: [1] }),
        frameRate: 4,
        repeat: 0
      });

      // Camera — follows player, bounded to world size
      this.cameras.main.setBounds(0, 0, WORLD_W, WORLD_H);
      this.cameras.main.startFollow(player, true, 0.1, 0.1);

      // Input — arrow keys + space (createCursorKeys), plus WASD
      cursors = this.input.keyboard.createCursorKeys();
      wasd = this.input.keyboard.addKeys({
        up: Phaser.Input.Keyboard.KeyCodes.W,
        left: Phaser.Input.Keyboard.KeyCodes.A,
        right: Phaser.Input.Keyboard.KeyCodes.D
      });

      // G key — toggles arcade physics hitbox overlay at runtime
      keyG = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.G);

      // ── Debug overlay — fixed to camera, top-right corner ─
      // setScrollFactor(0) keeps it in screen space while the camera pans
      debugText = this.add.text(1270, 10, '', {
        fontFamily: 'monospace',
        fontSize: '13px',
        color: '#00ffcc',
        backgroundColor: '#00000099',
        padding: { x: 10, y: 8 },
        lineSpacing: 4
      })
        .setScrollFactor(0)
        .setOrigin(1, 0)     // anchor top-right so text grows left/downward
        .setDepth(100);
    }

    // ── UPDATE — runs every frame ──────────────────────────
    function update(time, delta) {
      const onGround = player.body.blocked.down;

      // ── Coyote time ──────────────────────────────────────
      // Reset the 150ms window whenever the player is grounded.
      // Tick it down while airborne so the window expires naturally.
      // Consuming coyoteTimer = 0 on jump prevents a second mid-air jump.
      if (onGround) {
        coyoteTimer = COYOTE_MS;
      } else {
        coyoteTimer = Math.max(0, coyoteTimer - delta);
      }

      const canJump = coyoteTimer > 0;

      // ── Horizontal movement ──────────────────────────────
      const goLeft = cursors.left.isDown || wasd.left.isDown;
      const goRight = cursors.right.isDown || wasd.right.isDown;

      if (goLeft) {
        player.setVelocityX(-MOVE_SPEED);
        player.setFlipX(true);
      } else if (goRight) {
        player.setVelocityX(MOVE_SPEED);
        player.setFlipX(false);
      } else {
        player.setVelocityX(0);
      }

      // ── Jump ─────────────────────────────────────────────
      // JustDown fires once per key press, preventing hold-to-spam
      const jumpPressed =
        Phaser.Input.Keyboard.JustDown(cursors.up) ||
        Phaser.Input.Keyboard.JustDown(cursors.space) ||
        Phaser.Input.Keyboard.JustDown(wasd.up);

      if (jumpPressed && canJump) {
        player.setVelocityY(JUMP_VEL);
        coyoteTimer = 0;  // consume the window — no double-jump
      }

      // ── Animation state ───────────────────────────────────
      // true = don't restart if already playing (prevents flicker on held keys)
      const animState = !onGround ? 'jump'
        : player.body.velocity.x !== 0 ? 'run'
          : 'idle';

      player.anims.play(animState, true);

      // ── G key — toggle physics hitbox overlay ─────────────
      if (Phaser.Input.Keyboard.JustDown(keyG)) {
        this.physics.world.drawDebug = !this.physics.world.drawDebug;
        if (!this.physics.world.drawDebug) {
          this.physics.world.debugGraphic.clear();
        }
      }

      // ── Debug overlay — updated every frame ───────────────
      const vx = Math.round(player.body.velocity.x);
      const vy = Math.round(player.body.velocity.y);
      const px = Math.round(player.x);
      const py = Math.round(player.y);
      const facing = player.flipX ? 'left' : 'right';

      debugText.setText(
        `state:    ${animState}\n` +
        `grounded: ${onGround ? 'yes' : 'no'}\n` +
        `vel:      x:${String(vx).padStart(5)}  y:${String(vy).padStart(5)}\n` +
        `pos:      x:${String(px).padStart(5)}  y:${String(py).padStart(5)}\n` +
        `facing:   ${facing}\n` +
        `\n[G] toggle hitboxes`
      );
    }

  </script>
