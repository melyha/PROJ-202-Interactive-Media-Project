<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Enigma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols:wght@900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>

<body>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>

  <script>

    // ── CONSTANTS ─────────────────────────────────────────
    const MOVE_SPEED = 250;
    const JUMP_VEL = -600;
    const COYOTE_MS = 150;   // grace window after leaving a platform edge
    const COINS_TO_CONVERT = 15;   // coins required for one companion energy star

    // ── VARIABLES ─────────────────────────────────────────
    let player;
    let groundLayer;
    let platformsGroup;
    let cursors;
    let wasd;
    let coyoteTimer = 0;        // ms remaining in coyote window
    let debugText;              // HUD text object (fixed to camera)
    let keyG;                   // G key — toggles physics hitbox overlay

    // ── Parallax background layers ────────────────────────
    let bgLayers = [];   // [{sprite, factor}, ...] updated each frame

    // ── Attack system ──────────────────────────────────────
    let attackZone;
    let attackState = 'ready';   // 'ready' | 'active' | 'cooldown'
    let attackIsKick = false;
    let keyJ, keyK;
    let scene;

    // ── Game state ─────────────────────────────────────────
    let playerLives = 3;
    let coinCount = 0;
    let gemCount = 0;
    let keysCollected = 0;
    let totalKeys = 0;
    let levelComplete = false;
    let isInvincible = false;
    let isOnLadder = false;
    let doorCooldown = false;

    // ── Tile groups ─────────────────────────────────────────
    let blockGroup;
    let hazardGroup;
    let ladderGroup;
    let doorGroup;
    let collectiblesGroup;

    // ── HUD references ──────────────────────────────────────
    let hudHearts = [];    // [img0, img1, img2] — player heart slots
    let hudCoinsText;
    let hudGemsText;
    let hudKeysText;
    let hudHeartBlink = null;  // active blink tween (targets hudHearts[0])
    let vignetteGfx = null;  // red edge vignette (last-life warning)
    let hudCompanionHearts = [];    // companion heart slots
    let hudStars = [];    // companion energy star icons (0–3)
    let starGlowTween = null;  // glow tween when all 3 stars filled

    // ── Death state ──────────────────────────────────────────
    let isDead = false;

    // ── Companion ────────────────────────────────────────────
    let companion = null;
    let companionIdleTime = 0;
    let companionIsFront = false;
    let companionLives = 3;      // separate from playerLives
    let hudCompanionIcon = null;   // reference to companion HUD head icon
    let companionStars = 1;      // 1–3 energy stars (always visible; starts at 1)
    let conversionAvailable = false;  // threshold reached, popup not yet shown
    let companionReady = false;  // companion ability charged
    let companionOperating = false;  // companion has started active movement after ready
    let conversionPopupOpen = false;  // popup currently visible (blocks input)
    let conversionPending = false;  // conversion banner is showing (allows play)
    let lastConversionThreshold = 0;  // highest threshold offered so far
    let conversionBannerObjs = [];    // elements for the persistent conversion banner
    let readyBannerObjs = [];    // elements for the persistent ready banner

    // ── TILE ROUTING ──────────────────────────────────────────
    function getTileCategory(key) {
      if (key.startsWith('flag') || key.startsWith('torch') ||
        key.startsWith('bush') || key.startsWith('cactus') ||
        key.startsWith('sign') || key.startsWith('mushroom') ||
        key.startsWith('rock') || key.startsWith('fence') ||
        key.startsWith('chain') || key.startsWith('window') ||
        key.startsWith('hill') || key.startsWith('grass') ||
        key.startsWith('hud'))
        return 'backdrop';
      if (key.startsWith('terrain')) return 'terrain';
      if (key.startsWith('block')) return 'block';
      if (key.startsWith('brick')) return 'brick';
      if (key.startsWith('lava') || key === 'spikes' ||
        key === 'saw' || key.startsWith('bomb') ||
        key.startsWith('water')) return 'hazard';
      if (key.startsWith('ladder')) return 'ladder';
      if (key.startsWith('door')) return 'door';
      if (key.startsWith('coin')) return 'collectible';
      if (key.startsWith('gem')) return 'collectible';
      if (key.startsWith('key_')) return 'collectible';
      if (key.startsWith('lock')) return 'terrain';
      return 'terrain';
    }

    // ── GAME LOGIC HELPERS ────────────────────────────────────

    function showFloatingText(sc, x, y, msg, color) {
      const txt = sc.add.text(x, y, msg, {
        fontFamily: '"Press Start 2P"',
        fontSize: '12px',
        color,
        stroke: '#000000',
        strokeThickness: 3
      }).setOrigin(0.5).setDepth(30);
      sc.tweens.add({
        targets: txt,
        y: y - 40,
        alpha: 0,
        duration: 1500,
        onComplete: () => { txt.destroy(); }
      });
    }

    function updateHudLives() {
      updatePlayerHearts();
    }

    function updatePlayerHearts() {
      // Map lives count → texture per slot
      // 3 → full full full
      // 2 → full full empty
      // 1 → half empty empty  (+ warn)
      // 0 → empty empty empty (death handled by caller)
      const t = ['hud_heart_empty', 'hud_heart_empty', 'hud_heart_empty'];
      if (playerLives >= 3) { t[0] = t[1] = t[2] = 'hud_heart'; }
      else if (playerLives === 2) { t[0] = t[1] = 'hud_heart'; }
      else if (playerLives === 1) { t[0] = 'hud_heart_half'; }
      for (let i = 0; i < 3; i++) {
        if (hudHearts[i]) hudHearts[i].setTexture(t[i]);
      }
      if (playerLives === 1) {
        if (!hudHeartBlink && hudHearts[0]) {
          hudHeartBlink = scene.tweens.add({
            targets: hudHearts[0], alpha: 0.2, duration: 400, yoyo: true, repeat: -1
          });
        }
        if (!vignetteGfx) {
          vignetteGfx = scene.add.graphics().setScrollFactor(0).setDepth(19);
          vignetteGfx.fillStyle(0xff0000, 0.25);
          vignetteGfx.fillRect(0, 0, 1280, 60);
          vignetteGfx.fillRect(0, 660, 1280, 60);
          vignetteGfx.fillRect(0, 0, 60, 720);
          vignetteGfx.fillRect(1220, 0, 60, 720);
        }
      } else if (playerLives > 1) {
        clearLastLifeWarning();
      }
    }

    function updateCompanionHearts() {
      const t = ['hud_heart_empty', 'hud_heart_empty', 'hud_heart_empty'];
      if (companionLives >= 3) { t[0] = t[1] = t[2] = 'hud_heart'; }
      else if (companionLives === 2) { t[0] = t[1] = 'hud_heart'; }
      else if (companionLives === 1) { t[0] = 'hud_heart_half'; }
      for (let i = 0; i < 3; i++) {
        if (hudCompanionHearts[i]) hudCompanionHearts[i].setTexture(t[i]);
      }
      if (companionLives <= 0) {
        // Companion inactive — grey out icon
        if (hudCompanionIcon) { hudCompanionIcon.setTint(0x555555).setAlpha(0.5); }
        if (companion) { companion.setTint(0x555555).setAlpha(0.5); }
      }
    }

    // ── COMPANION ENERGY STAR SYSTEM ─────────────────────────

    function checkCoinConversion() {
      if (conversionPopupOpen || conversionPending || companionStars >= 3) return;
      const threshold = Math.floor(coinCount / COINS_TO_CONVERT);
      if (threshold > lastConversionThreshold) {
        lastConversionThreshold = threshold;
        conversionAvailable = true;
        showConversionPopup();
      }
    }

    function showConversionPopup() {
      conversionPopupOpen = true;
      player.body.setVelocity(0, 0);
      player.body.moves = false;

      const PX = 640, PY = 360;
      const panel = scene.add.rectangle(PX, PY, 520, 190, 0x000033, 0.88)
        .setScrollFactor(0).setDepth(60);
      const border = scene.add.graphics().setScrollFactor(0).setDepth(60);
      border.lineStyle(2, 0xaa88ff, 1);
      border.strokeRect(PX - 260, PY - 95, 520, 190);

      const line1 = scene.add.text(PX, PY - 52, '\u2736 15 Coins collected!', {
        fontFamily: '"Press Start 2P"', fontSize: '13px', color: '#ffd700',
        stroke: '#000000', strokeThickness: 3
      }).setOrigin(0.5).setScrollFactor(0).setDepth(61);

      const line2 = scene.add.text(PX, PY - 18, 'Convert to Companion Energy?', {
        fontFamily: '"Press Start 2P"', fontSize: '10px', color: '#ffffff',
        stroke: '#000000', strokeThickness: 2
      }).setOrigin(0.5).setScrollFactor(0).setDepth(61);

      const yesBtn = scene.add.text(PX - 110, PY + 38, '[ YES \u2014 Convert ]', {
        fontFamily: '"Press Start 2P"', fontSize: '10px', color: '#00ff88',
        stroke: '#000000', strokeThickness: 2, backgroundColor: '#003311',
        padding: { x: 8, y: 6 }
      }).setOrigin(0.5).setScrollFactor(0).setDepth(61).setInteractive({ useHandCursor: true });

      const noBtn = scene.add.text(PX + 110, PY + 38, '[ Not Yet ]', {
        fontFamily: '"Press Start 2P"', fontSize: '10px', color: '#ff6666',
        stroke: '#000000', strokeThickness: 2, backgroundColor: '#330011',
        padding: { x: 8, y: 6 }
      }).setOrigin(0.5).setScrollFactor(0).setDepth(61).setInteractive({ useHandCursor: true });

      const elements = [panel, border, line1, line2, yesBtn, noBtn];

      const closePopup = () => {
        elements.forEach(e => e.destroy());
        conversionPopupOpen = false;
        player.body.moves = true;
      };

      yesBtn.on('pointerdown', () => {
        closePopup();
        coinCount -= COINS_TO_CONVERT;
        if (hudCoinsText) hudCoinsText.setText(String(coinCount));
        // Reset threshold based on remaining coins so next 15 triggers again
        lastConversionThreshold = Math.floor(coinCount / COINS_TO_CONVERT);
        companionStars = Math.min(3, companionStars + 1);
        updateHudStars();
        showReadyPopup();
      });

      noBtn.on('pointerdown', () => {
        closePopup();
        conversionAvailable = false;
        showConversionBanner();
      });

      // Hover highlights
      yesBtn.on('pointerover', () => yesBtn.setColor('#ffffff'));
      yesBtn.on('pointerout', () => yesBtn.setColor('#00ff88'));
      noBtn.on('pointerover', () => noBtn.setColor('#ffffff'));
      noBtn.on('pointerout', () => noBtn.setColor('#ff6666'));
    }

    function showReadyPopup() {
      conversionPopupOpen = true;
      player.body.moves = false;

      const PX = 640, PY = 360;
      const panel = scene.add.rectangle(PX, PY, 420, 160, 0x000033, 0.88)
        .setScrollFactor(0).setDepth(60);
      const border = scene.add.graphics().setScrollFactor(0).setDepth(60);
      border.lineStyle(2, 0xaa88ff, 1);
      border.strokeRect(PX - 210, PY - 80, 420, 160);

      const msg = scene.add.text(PX, PY - 22, 'Companion ready\nto operate!', {
        fontFamily: '"Press Start 2P"', fontSize: '13px', color: '#aa88ff',
        stroke: '#000000', strokeThickness: 3, align: 'center'
      }).setOrigin(0.5).setScrollFactor(0).setDepth(61);

      const okBtn = scene.add.text(PX, PY + 44, '[ OK ]', {
        fontFamily: '"Press Start 2P"', fontSize: '12px', color: '#ffd700',
        stroke: '#000000', strokeThickness: 2, backgroundColor: '#332200',
        padding: { x: 10, y: 6 }
      }).setOrigin(0.5).setScrollFactor(0).setDepth(61).setInteractive({ useHandCursor: true });

      const elements = [panel, border, msg, okBtn];

      okBtn.on('pointerdown', () => {
        elements.forEach(e => e.destroy());
        conversionPopupOpen = false;
        player.body.moves = true;
        companionReady = true;
        showReadyBanner();
      });

      okBtn.on('pointerover', () => okBtn.setColor('#ffffff'));
      okBtn.on('pointerout', () => okBtn.setColor('#ffd700'));
    }

    function updateHudStars() {
      // Destroy existing star images and rebuild all 3 slots
      hudStars.forEach(s => s.destroy());
      hudStars = [];
      if (starGlowTween) { starGlowTween.stop(); starGlowTween = null; }

      // Always render 3 slots — gold for earned, dim for unearned
      for (let i = 0; i < 3; i++) {
        const star = scene.add.image(48 + i * 20, 96, 'star')
          .setScale(0.4).setScrollFactor(0).setDepth(20);
        if (i >= companionStars) star.setAlpha(0.3);   // unearned slot
        hudStars.push(star);
      }

      // At 3 stars: slow scale pulse (1.0 → 1.1 → 1.0, loop, 800ms)
      if (companionStars === 3) {
        starGlowTween = scene.tweens.add({
          targets: hudStars,
          scaleX: 0.44, scaleY: 0.44,   // 0.4 × 1.1 = 0.44
          duration: 800,
          yoyo: true,
          repeat: -1,
          ease: 'Sine.InOut'
        });
      }
    }

    // ── PERSISTENT BANNERS (shown after popup dismissal) ─────

    function showConversionBanner() {
      conversionPending = true;
      const CW = 1280;
      const bg = scene.add.rectangle(CW / 2, 20, CW, 40, 0x1a0a2e, 0.88)
        .setScrollFactor(0).setDepth(30);
      const txt = scene.add.text(12, 20,
        '\u2736 Convert coins to companion energy?', {
        fontFamily: '"Press Start 2P"', fontSize: '7px', color: '#f5c875'
      }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(30);
      const yesBtn = scene.add.text(CW - 60, 20, '[ YES ]', {
        fontFamily: '"Press Start 2P"', fontSize: '7px', color: '#44cc88'
      }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(30)
        .setInteractive({ useHandCursor: true });

      conversionBannerObjs = [bg, txt, yesBtn];

      yesBtn.on('pointerover', () => yesBtn.setTint(0xffff99));
      yesBtn.on('pointerout', () => yesBtn.clearTint());
      yesBtn.on('pointerdown', () => {
        // Destroy banner
        conversionBannerObjs.forEach(e => e.destroy());
        conversionBannerObjs = [];
        conversionPending = false;
        // Full YES conversion logic
        coinCount -= COINS_TO_CONVERT;
        if (hudCoinsText) hudCoinsText.setText(String(coinCount));
        lastConversionThreshold = Math.floor(coinCount / COINS_TO_CONVERT);
        companionStars = Math.min(3, companionStars + 1);
        updateHudStars();
        showReadyPopup();
      });
    }

    function showReadyBanner() {
      // Stack below conversion banner if it is still showing
      const bannerY = conversionPending ? 44 : 0;
      const CW = 1280;
      const bg = scene.add.rectangle(CW / 2, bannerY + 20, CW, 40, 0x1a0a2e, 0.88)
        .setScrollFactor(0).setDepth(30);
      const txt = scene.add.text(12, bannerY + 20,
        '\u2736 Companion ready to operate!', {
        fontFamily: '"Press Start 2P"', fontSize: '7px', color: '#c8aaff'
      }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(30);

      readyBannerObjs = [bg, txt];
      // No button — auto-dismissed when companionOperating becomes true (see update())
    }

    function clearLastLifeWarning() {
      if (hudHeartBlink) {
        hudHeartBlink.stop();
        hudHeartBlink = null;
        if (hudHearts[0]) hudHearts[0].setAlpha(1);
      }
      if (vignetteGfx) {
        vignetteGfx.destroy();
        vignetteGfx = null;
      }
    }

    function triggerDeathSequence() {
      if (isDead) return;
      isDead = true;
      levelComplete = true;

      // Freeze player — stop velocity and prevent physics from moving it
      player.body.setVelocity(0, 0);
      player.body.moves = false;

      // Play fallDown animation (frame 44 = "fallDown" in spritesheet)
      player.anims.play('fallDown', true);

      // Companion death reaction — spin and fall off screen
      if (companion) {
        scene.tweens.add({
          targets: companion,
          angle: 360,
          y: companion.y + 250,
          alpha: 0,
          duration: 900,
          ease: 'Cubic.In'
        });
      }

      // Screen shake
      scene.cameras.main.shake(400, 0.02);

      // Black overlay: fades from 0 → 0.7 over 1000ms (depth 45 = below text at 50)
      const overlay = scene.add.rectangle(640, 360, 1280, 720, 0x000000)
        .setScrollFactor(0).setDepth(45).setAlpha(0);
      scene.tweens.add({ targets: overlay, alpha: 0.7, duration: 1000 });

      // After 1500ms: GAME OVER text fades in (depth 50 = above overlay)
      scene.time.delayedCall(1500, () => {
        const goText = scene.add.text(640, 310, 'GAME OVER', {
          fontFamily: '"Press Start 2P"',
          fontSize: '48px',
          color: '#ff0000',
          stroke: '#000000',
          strokeThickness: 6
        }).setOrigin(0.5).setScrollFactor(0).setDepth(50).setAlpha(0);

        const retryText = scene.add.text(640, 410, 'PRESS SPACE TO RETRY', {
          fontFamily: '"Press Start 2P"',
          fontSize: '14px',
          color: '#ffffff',
          stroke: '#000000',
          strokeThickness: 3
        }).setOrigin(0.5).setScrollFactor(0).setDepth(50).setAlpha(0);

        scene.tweens.add({ targets: [goText, retryText], alpha: 1, duration: 500 });

        // SPACE restarts the scene (scene.restart() calls create() again;
        // global vars are reset at the top of create())
        scene.input.keyboard.once('keydown-SPACE', () => {
          scene.scene.restart();
        });
      });
    }

    function onHazard(playerObj, hazard) {
      // isInvincible set as FIRST thing — guards against overlap firing multiple times per step
      if (isInvincible || levelComplete) return;
      isInvincible = true;
      playerLives--;
      updateHudLives();

      if (playerLives <= 0) {
        triggerDeathSequence();
        return;
      }

      // Play hurt animation briefly (plays once, update() resumes normal anim after)
      player.anims.play('hurt');

      // Flash player during 1500ms invincibility window (9 yoyos × 2 × 80ms ≈ 1440ms)
      scene.tweens.add({
        targets: player,
        alpha: 0.3,
        duration: 80,
        yoyo: true,
        repeat: 9,
        onComplete: () => { player.setAlpha(1); isInvincible = false; }
      });
    }

    function spawnSingleCoin(block) {
      const coin = scene.add.image(block.x, block.y - 16, 'coin_gold')
        .setScale(0.6).setDepth(5);
      scene.tweens.add({
        targets: coin,
        y: block.y - 80,
        alpha: 0,
        duration: 600,
        ease: 'Cubic.Out',
        onComplete: () => { coin.destroy(); }
      });
      coinCount++;
      if (hudCoinsText) hudCoinsText.setText(String(coinCount));
      checkCoinConversion();
    }

    function spawnCoinBurst(block, count) {
      coinCount += count;
      if (hudCoinsText) hudCoinsText.setText(String(coinCount));
      checkCoinConversion();
      showFloatingText(scene, block.x, block.y - 48, `+${count}`, '#ffd700');

      for (let i = 0; i < count; i++) {
        const delay = i * 25;                           // stagger each coin 25ms
        const spreadX = (Math.random() - 0.5) * 140;     // -70..+70 horizontal
        const upDist = 90 + Math.random() * 70;         // 90..160px upward
        const coin = scene.add.image(block.x, block.y - 32, 'coin_gold')
          .setScale(0.5).setDepth(5).setAlpha(0);

        scene.time.delayedCall(delay, () => {
          coin.setAlpha(1);
          // Phase 1: arc upward and spread out
          scene.tweens.add({
            targets: coin,
            x: block.x + spreadX,
            y: block.y - 32 - upDist,
            duration: 220,
            ease: 'Cubic.Out',
            onComplete: () => {
              // Phase 2: fall back down and fade out
              scene.tweens.add({
                targets: coin,
                y: block.y + 16,
                alpha: 0,
                duration: 380,
                ease: 'Cubic.In',
                onComplete: () => coin.destroy()
              });
            }
          });
        });
      }
    }

    function onBlockHit(block) {
      const key = block.texture.key;
      const origY = block.y;

      // Bounce tween — applies to every block type
      scene.tweens.add({
        targets: block,
        y: origY - 8,
        duration: 80,
        yoyo: true,
        onComplete: () => { block.y = origY; block.refreshBody(); }
      });

      if (key === 'block_coin_active') {
        // Active coin block → 1 coin → reverts to inert block_coin
        spawnSingleCoin(block);
        scene.time.delayedCall(200, () => { block.setTexture('block_coin'); block.refreshBody(); });

      } else if (key === 'block_strong_coin_active') {
        // Active strong coin → 12-coin burst → reverts to inert block_strong_coin
        spawnCoinBurst(block, 12);
        scene.time.delayedCall(200, () => { block.setTexture('block_strong_coin'); block.refreshBody(); });

      } else if (key === 'block_exclamation_active') {
        // Active exclamation → +1 life → reverts to inert block_exclamation
        const heart = scene.add.image(block.x, block.y - 48, 'hud_heart')
          .setScale(0.5).setDepth(5);
        scene.tweens.add({
          targets: heart, y: block.y - 96, alpha: 0, duration: 600,
          onComplete: () => { heart.destroy(); }
        });
        playerLives = Math.min(playerLives + 1, 9);
        updateHudLives();
        scene.time.delayedCall(200, () => { block.setTexture('block_exclamation'); block.refreshBody(); });

      } else if (key === 'block_strong_exclamation_active') {
        // Active strong exclamation → 2000ms shield (gold flash, invincibility) → reverts to block_strong_exclamation
        if (!isInvincible) {
          isInvincible = true;
          showFloatingText(scene, block.x, block.y - 48, 'SHIELD!', '#ffd700');
          player.setTint(0xffd700);
          const shieldTween = scene.tweens.add({
            targets: player, alpha: 0.7, duration: 150, yoyo: true, repeat: -1
          });
          scene.time.delayedCall(2000, () => {
            shieldTween.stop();
            player.clearTint();
            player.setAlpha(1);
            isInvincible = false;
          });
        }
        scene.time.delayedCall(200, () => { block.setTexture('block_strong_exclamation'); block.refreshBody(); });

      } else if (key === 'block_yellow') {
        // Yellow block → 40% empty / 60% 1 coin → always converts to block_empty
        if (Math.random() < 0.6) spawnSingleCoin(block);
        scene.time.delayedCall(200, () => { block.setTexture('block_empty'); block.refreshBody(); });
      }
      // All other blocks — bounce only, no conversion
    }

    function onCollect(playerObj, item) {
      if (!item.active) return;
      item.setActive(false);
      item.body.enable = false;
      const texKey = item.texture.key;

      // Pop scale tween then destroy
      scene.tweens.add({
        targets: item,
        scaleX: 2,
        scaleY: 2,
        alpha: 0,
        duration: 200,
        onComplete: () => { item.destroy(); }
      });

      if (texKey.startsWith('coin')) {
        coinCount++;
        if (hudCoinsText) hudCoinsText.setText(String(coinCount));
        checkCoinConversion();
      } else if (texKey.startsWith('gem')) {
        gemCount++;
        if (hudGemsText) hudGemsText.setText(String(gemCount));
      } else if (texKey.startsWith('key_')) {
        keysCollected++;
        if (hudKeysText) hudKeysText.setText(`${keysCollected}/${totalKeys}`);
        showFloatingText(scene, item.x, item.y - 40, 'KEY COLLECTED', '#00ff88');
      }
    }

    function onDoor(playerObj, door) {
      if (levelComplete || doorCooldown) return;
      doorCooldown = true;
      scene.time.delayedCall(2000, () => { doorCooldown = false; });
      if (keysCollected >= totalKeys) {
        levelComplete = true;
        // Clear all door tiles so player can walk through
        scene.time.delayedCall(50, () => { doorGroup.clear(true, true); });
        showFloatingText(scene, door.x, door.y - 64, 'LEVEL COMPLETE!', '#ffff00');
        console.log('LEVEL COMPLETE');
      } else {
        showFloatingText(scene, door.x, door.y - 64, 'FIND ALL KEYS FIRST', '#ff4444');
      }
    }

    // ── CREATE — gym level sandbox ─────────────────────────
    function create() {
      scene = this;

      // ── Reset all game state — supports scene.scene.restart() ──
      playerLives = 3;
      coinCount = 0;
      gemCount = 0;
      keysCollected = 0;
      totalKeys = 0;
      levelComplete = false;
      isInvincible = false;
      isOnLadder = false;
      doorCooldown = false;
      isDead = false;
      bgLayers = [];
      attackState = 'ready';
      attackIsKick = false;
      coyoteTimer = 0;
      hudHeartBlink = null;
      vignetteGfx = null;
      hudHearts = [];
      hudCompanionHearts = [];
      companion = null;
      companionIdleTime = 0;
      companionIsFront = false;
      companionLives = 3;
      hudCompanionIcon = null;
      companionStars = 1;
      conversionAvailable = false;
      companionReady = false;
      companionOperating = false;
      conversionPopupOpen = false;
      conversionPending = false;
      lastConversionThreshold = 0;
      hudStars = [];
      starGlowTween = null;
      conversionBannerObjs = [];
      readyBannerObjs = [];

      // ── Level dimensions from editor JSON ─────────────────
      const levelData = this.cache.json.get('level1');
      const T = levelData.tileSize;    // 64
      const worldW = levelData.cols * T;    // 3200  (50 cols × 64)
      const worldH = levelData.rows * T;    // 896   (14 rows × 64)

      // Expand physics world to match level size
      this.physics.world.setBounds(0, 0, worldW, worldH);

      // ── Parallax backgrounds — added FIRST so they render behind everything ──
      //
      // tileSprite(x, y, width, height, key)
      //   width  3200 = 2× world width — absorbs any sprite drift from scrollFactor
      //   height sized per layer so each covers its visual zone
      //
      // setScrollFactor(f) — sprite position drifts at f× camera speed (parallax)
      // tilePositionX      — texture offset also updated each frame in update()
      //
      // Y positions are tuned for the typical camera state when the player is
      // near ground level: camera.scrollY ≈ 180 (world 900 − canvas 720).
      // screenY = worldY − camera.scrollY × factor
      //
      // Sky uses factor 0 so its (x, y) are pure screen coordinates.
      // All other layers use world coordinates that produce the right screen
      // position at scrollY = 180.

      const BG_W = worldW * 2;   // 2× level width — absorbs parallax sprite drift
      const addBg = (key, factor, wx, wy, w, h) => {
        const s = this.add.tileSprite(wx, wy, w, h, key);
        s.setScrollFactor(factor);
        bgLayers.push({ sprite: s, factor });
      };

      // 1. Sky — fixed, fills entire canvas (scrollFactor 0 = screen-space position)
      addBg('background_solid_sky', 0, 640, 360, BG_W, 720);

      // 2. Clouds — very slow drift, upper ~60% of screen
      //    worldY=200: screenY = 200 − 180×0.05 = 191; covers −25..407
      addBg('background_clouds', 0.05, 1600, 300, BG_W, 600);


      // 3. Fade hills — mid distance (fade-to-transparent bottom blends with next layer)
      //    worldY=498: screenY = 498 − 180×0.1 = 480; covers 280..680
      addBg('background_fade_hills', 0.1, 1600, 530, BG_W, 600);

      // 4. Color hills — slightly closer
      //    worldY=527: screenY = 527 − 180×0.15 = 500; covers 300..700
      addBg('background_color_hills', 0.15, 1600, 527, BG_W, 400);

      // 5. Fade trees — near distance
      //    worldY=585: screenY = 585 − 180×0.25 = 540; covers 340..740
      addBg('background_fade_trees', 0.25, 1600, 585, BG_W, 400);

      // 6. Color trees — closest background layer
      //    worldY=623: screenY = 623 − 180×0.35 = 560; covers 360..760
      addBg('background_color_trees', 0.35, 1600, 623, BG_W, 400);

      // 7. Grass strip — ground level, flush to screen bottom at scrollY=180
      //    worldY=746: screenY = 746 − 180×0.5 = 656; covers 592..720 ✓
      addBg('background_solid_grass', 0.5, 1600, 746, BG_W, 150);

      // ── Static groups ──────────────────────────────────────
      groundLayer = this.physics.add.staticGroup();
      platformsGroup = this.physics.add.staticGroup();
      blockGroup = this.physics.add.staticGroup();
      hazardGroup = this.physics.add.staticGroup();
      ladderGroup = this.physics.add.staticGroup();
      doorGroup = this.physics.add.staticGroup();
      collectiblesGroup = this.physics.add.staticGroup();

      // ── Count total key tiles for HUD denominator ────────────
      totalKeys = levelData.tiles.filter(t => t.key.startsWith('key_')).length;

      // ── Load tiles — routed to the correct group by key prefix ──
      levelData.tiles.forEach(tile => {
        const cat = getTileCategory(tile.key);

        if (cat === 'backdrop') {
          this.add.image(tile.x, tile.y, tile.key).setDepth(0);
          return;
        }

        let s;
        if (cat === 'terrain' || cat === 'brick') {
          s = platformsGroup.create(tile.x, tile.y, tile.key);
        } else if (cat === 'block') {
          s = blockGroup.create(tile.x, tile.y, tile.key);
          s.triggered = false;
        } else if (cat === 'hazard') {
          s = hazardGroup.create(tile.x, tile.y, tile.key);
        } else if (cat === 'ladder') {
          s = ladderGroup.create(tile.x, tile.y, tile.key);
        } else if (cat === 'door') {
          s = doorGroup.create(tile.x, tile.y, tile.key);
        } else if (cat === 'collectible') {
          s = collectiblesGroup.create(tile.x, tile.y, tile.key);
        } else {
          s = platformsGroup.create(tile.x, tile.y, tile.key);
        }
        s.refreshBody();
      });

      // ── GYM LEVEL — kept as reference, not called ─────────
      // const place = (group, cx, cy, key) => { const s = group.create(cx, cy, key); s.refreshBody(); };
      // const platform = (x, y, count) => {
      //   for (let i = 0; i < count; i++) {
      //     const cx = x + 32 + i * T;
      //     const key = i === 0 ? 'terrain_purple_horizontal_left'
      //               : i === count - 1 ? 'terrain_purple_horizontal_right'
      //               : 'terrain_purple_horizontal_middle';
      //     place(platformsGroup, cx, y, key);
      //   }
      // };
      // const GY = worldH - T / 2;  // 868 for 900-tall world
      // place(groundLayer, 32, GY, 'terrain_purple_block_top_left');
      // for (let i = 1; i <= 23; i++) place(groundLayer, 32 + i * T, GY, 'terrain_purple_block_top');
      // place(groundLayer, 32 + 24 * T, GY, 'terrain_purple_block_top_right');
      // platform(200, 650, 4);  platform(450, 500, 4);  platform(750, 380, 3);
      // platform(1050, 500, 4); platform(1300, 650, 4);

      // Player — 96×128 femaleAdventurer spritesheet, displayed at 0.75 scale → 72×96px.
      //
      // Body math (Phaser applies scale to setSize args):
      //   body.width   = sourceW  * 0.75 = 56  * 0.75 = 42px
      //   body.height  = sourceH  * 0.75 = 104 * 0.75 = 78px
      //   body.x       = x - 36 + offsetX * 0.75  → centered on sprite
      //   body.bottom  = y - 48 + (offsetY + sourceH) * 0.75
      //                = y - 48 + 128 * 0.75 = y + 48  ← exact sprite bottom
      //
      // Constraint: offsetY + sourceH = frameH (128) ensures feet land on surfaces.
      // offsetY = 24 excludes the head (~18px world); offsetX = 20 centers the body.
      //
      // Spawn y: ground surface = GY - 32 = 836. body.bottom = y + 48.
      // y = 836 - 48 = 788 places player standing exactly on ground at start.
      player = this.physics.add.sprite(100, 700, 'player');
      player.setScale(0.75);
      player.setDepth(10);
      player.body.setSize(56, 104);  // frame-space: 42×78px world
      player.body.setOffset(20, 24); // center X; push body down past head
      player.setCollideWorldBounds(true);

      // ── Companion — no physics, lerp-based follow ─────────
      companion = this.add.image(player.x - 80, player.y - 60, 'character_purple_idle')
        .setScale(0.5).setDepth(9);

      // Solid terrain colliders
      this.physics.add.collider(player, groundLayer);
      this.physics.add.collider(player, platformsGroup);

      // Block collider — also detects hit-from-below for exclamation blocks
      this.physics.add.collider(player, blockGroup, (playerObj, block) => {
        if (block.triggered || !player.body.blocked.up) return;
        block.triggered = true;
        onBlockHit(block);
      });

      // Door collider — blocks player; onDoor handles key check
      this.physics.add.collider(player, doorGroup, onDoor);

      // Hazard overlap — damages player on contact
      this.physics.add.overlap(player, hazardGroup, onHazard, null, this);

      // Collectibles overlap — coins, gems, keys
      this.physics.add.overlap(player, collectiblesGroup, onCollect, null, this);

      // ── Animations — frame indices from assets.json spritesheets[0].animGroups ──
      const anim = (key, frames, frameRate, repeat) =>
        this.anims.create({ key, frames: this.anims.generateFrameNumbers('player', { frames }), frameRate, repeat });
      anim('idle', [0], 6, -1);
      anim('jump', [1], 6, 0);
      anim('fall', [2], 6, -1);
      anim('run', [24, 25, 26], 12, -1);
      anim('walk', [36, 37, 38, 39, 40, 41, 42, 43], 10, -1);
      anim('attack', [27, 28, 29], 10, 0);
      anim('kick', [19], 10, 0);
      anim('hurt', [33], 6, 0);
      anim('climb', [5, 6], 8, -1);
      anim('fallDown', [44], 6, 0);   // death pose — frame 44


      // ── Attack zone (invisible dynamic trigger) ───────────
      // Positioned and sized each frame in update() while attackState === 'active'
      const atkGfx = this.make.graphics({ add: false });
      atkGfx.fillStyle(0xffffff, 1);
      atkGfx.fillRect(0, 0, 1, 1);
      atkGfx.generateTexture('attackTex', 1, 1);
      atkGfx.destroy();

      attackZone = this.physics.add.image(0, 0, 'attackTex');
      attackZone.setAlpha(0);
      attackZone.body.setAllowGravity(false);
      attackZone.body.enable = false;

      // Camera — follows player, bounded to world size
      this.cameras.main.setBounds(0, 0, worldW, worldH);
      this.cameras.main.startFollow(player, true, 0.1, 0.1);

      // Input — arrow keys + space (createCursorKeys), plus WASD
      cursors = this.input.keyboard.createCursorKeys();
      wasd = this.input.keyboard.addKeys({
        up: Phaser.Input.Keyboard.KeyCodes.W,
        left: Phaser.Input.Keyboard.KeyCodes.A,
        right: Phaser.Input.Keyboard.KeyCodes.D
      });

      // G key — toggles arcade physics hitbox overlay at runtime
      keyG = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.G);

      // J = attack, K = kick
      keyJ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
      keyK = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.K);

      // When an attack animation finishes: disable the hitbox, enter cooldown, then return to ready
      player.on('animationcomplete', (animObj) => {
        if (animObj.key === 'attack' || animObj.key === 'kick') {
          attackZone.body.enable = false;
          attackState = 'cooldown';
          scene.time.delayedCall(200, () => { attackState = 'ready'; });
        }
      });

      // ── HUD — fixed to screen, top-left ──────────────────────
      //
      //  Row 1 (y=16):  char_head icon  +  3× player hearts   spacing=28
      //  Row 2 (y=56):  companion icon  +  3× companion hearts spacing=28
      //  Row 2.5 (y=96): reserved for companion energy star system
      //  Row 3 (y=136): coins icon + count
      //  Row 4 (y=176): gems icon + count
      //  Row 5 (y=216): keys icon + count
      //
      const hudStyle = {
        fontFamily: '"Press Start 2P"',
        fontSize: '14px',
        color: '#ffffff',
        stroke: '#000000',
        strokeThickness: 3
      };

      // ── Row 1: Maevea — char_head icon + 3 player hearts ─
      this.add.image(16, 16, 'char_head')
        .setScale(0.5).setScrollFactor(0).setDepth(20);
      for (let i = 0; i < 3; i++) {
        hudHearts.push(
          this.add.image(44 + i * 28, 16, 'hud_heart')
            .setScale(0.5).setScrollFactor(0).setDepth(20)
        );
      }

      // ── Row 2: Sable — companion icon + 3 companion hearts ─
      hudCompanionIcon = this.add.image(16, 56, 'hud_player_purple')
        .setScale(0.5).setScrollFactor(0).setDepth(20);
      for (let i = 0; i < 3; i++) {
        hudCompanionHearts.push(
          this.add.image(44 + i * 28, 56, 'hud_heart')
            .setScale(0.5).setScrollFactor(0).setDepth(20)
        );
      }

      // ── Row 2.5 (y=96): reserved for energy star system ───
      // (nothing added here)

      // ── Row 3: Coins ──────────────────────────────────────
      this.add.image(16, 136, 'coin_gold')
        .setScale(0.5).setScrollFactor(0).setDepth(20);
      hudCoinsText = this.add.text(40, 136, '0', hudStyle)
        .setOrigin(0, 0.5).setScrollFactor(0).setDepth(20);

      // ── Row 4: Gems ───────────────────────────────────────
      this.add.image(16, 176, 'gem_yellow')
        .setScale(0.5).setScrollFactor(0).setDepth(20);
      hudGemsText = this.add.text(40, 176, '0', hudStyle)
        .setOrigin(0, 0.5).setScrollFactor(0).setDepth(20);

      // ── Row 5: Keys ───────────────────────────────────────
      this.add.image(16, 216, 'hud_key_yellow')
        .setScale(0.5).setScrollFactor(0).setDepth(20);
      hudKeysText = this.add.text(40, 216, `0/${totalKeys}`, hudStyle)
        .setOrigin(0, 0.5).setScrollFactor(0).setDepth(20);

      // Draw initial heart states and star display
      updatePlayerHearts();
      updateCompanionHearts();
      updateHudStars();

      // ── Debug overlay — fixed to camera, top-right corner ─
      // setScrollFactor(0) keeps it in screen space while the camera pans
      debugText = this.add.text(1270, 10, '', {
        fontFamily: 'monospace',
        fontSize: '13px',
        color: '#00ffcc',
        backgroundColor: '#00000099',
        padding: { x: 10, y: 8 },
        lineSpacing: 4
      })
        .setScrollFactor(0)
        .setOrigin(1, 0)     // anchor top-right so text grows left/downward
        .setDepth(100);
    }

    // ── UPDATE — runs every frame ──────────────────────────
    function update(time, delta) {
      const onGround = player.body.blocked.down;

      // ── Parallax — shift tile texture to match camera position ──
      // tilePositionX = scrollX × factor: far layers barely move, near layers move more.
      // This works in concert with setScrollFactor() set on each sprite in create().
      const camX = this.cameras.main.scrollX;
      for (const { sprite, factor } of bgLayers) {
        sprite.tilePositionX = camX * factor;
      }

      // ── Skip all input / physics during death sequence or popup ──
      if (isDead || conversionPopupOpen) return;

      // ── Ready banner dismiss — triggers when companion first moves after OK ──
      if (companionReady && !companionOperating && Math.abs(player.body.velocity.x) > 5) {
        companionOperating = true;
        // Destroy ready banner
        if (readyBannerObjs.length > 0) {
          readyBannerObjs.forEach(e => e.destroy());
          readyBannerObjs = [];
        }
        // One-shot scale pulse on all 3 star icons (scale 1.0 → 1.15 → 1.0, 400ms)
        if (hudStars.length > 0) {
          if (starGlowTween) { starGlowTween.stop(); starGlowTween = null; }
          scene.tweens.add({
            targets: hudStars,
            scaleX: 0.46, scaleY: 0.46,   // 0.4 × 1.15 = 0.46
            duration: 200,
            yoyo: true,
            ease: 'Sine.InOut',
            onComplete: () => {
              // Restart persistent scale pulse if still at 3 stars
              if (companionStars === 3 && hudStars.length > 0) {
                starGlowTween = scene.tweens.add({
                  targets: hudStars, scaleX: 0.44, scaleY: 0.44,
                  duration: 800, yoyo: true, repeat: -1, ease: 'Sine.InOut'
                });
              }
            }
          });
        }
      }

      // ── Companion follow ──────────────────────────────────
      if (companion) {
        const targetX = player.x - 80;
        const targetY = player.y - 60;
        companion.x += (targetX - companion.x) * 0.04;
        companion.y += (targetY - companion.y) * 0.04;
        companion.y += Math.sin(time * 0.003) * 0.8;  // gentle sine bob
        companion.setFlipX(player.flipX);

        // Switch to 'front' texture after 1s of player idle; back when moving
        const isPlayerIdle = player.body.velocity.x === 0 && onGround;
        if (isPlayerIdle) {
          companionIdleTime += delta;
          if (companionIdleTime >= 1000 && !companionIsFront) {
            companionIsFront = true;
            companion.setTexture('character_purple_front');
          }
        } else {
          companionIdleTime = 0;
          if (companionIsFront) {
            companionIsFront = false;
            companion.setTexture('character_purple_idle');
          }
        }
      }

      // ── Coyote time ──────────────────────────────────────
      if (onGround) {
        coyoteTimer = COYOTE_MS;
      } else {
        coyoteTimer = Math.max(0, coyoteTimer - delta);
      }
      const canJump = coyoteTimer > 0;

      // ── Ladder ────────────────────────────────────────────
      // this.physics.overlap() is a one-shot check — returns true if overlapping
      isOnLadder = this.physics.overlap(player, ladderGroup);
      if (isOnLadder) {
        player.body.setAllowGravity(false);
        if (cursors.up.isDown || wasd.up.isDown) {
          player.setVelocityY(-200);
        } else if (cursors.down.isDown) {
          player.setVelocityY(200);
        } else {
          player.setVelocityY(0);
        }
      } else {
        player.body.setAllowGravity(true);
      }

      // ── Attack triggers ───────────────────────────────────
      // Only fire when ready; animationcomplete listener handles the reset
      if (attackState === 'ready') {
        if (Phaser.Input.Keyboard.JustDown(keyJ)) {
          attackState = 'active';
          attackIsKick = false;
          player.anims.play('attack', true);
          attackZone.body.enable = true;
        } else if (Phaser.Input.Keyboard.JustDown(keyK)) {
          attackState = 'active';
          attackIsKick = true;
          player.anims.play('kick', true);
          attackZone.body.enable = true;
        }
      }

      // ── Attack zone tracking ──────────────────────────────
      // Each frame while active, keep the hitbox in front of the player
      if (attackState === 'active') {
        const range = attackIsKick ? 60 : 80;
        const dir = player.flipX ? -1 : 1;
        attackZone.setPosition(
          player.x + dir * (player.body.halfWidth + range / 2),
          player.y + 10
        );
        attackZone.body.setSize(range, 60, true);
      }

      // ── Horizontal movement ──────────────────────────────
      const goLeft = cursors.left.isDown || wasd.left.isDown;
      const goRight = cursors.right.isDown || wasd.right.isDown;

      if (goLeft) {
        player.setVelocityX(-MOVE_SPEED);
        player.setFlipX(true);
      } else if (goRight) {
        player.setVelocityX(MOVE_SPEED);
        player.setFlipX(false);
      } else {
        player.setVelocityX(0);
      }

      // ── Jump ─────────────────────────────────────────────
      const jumpPressed =
        Phaser.Input.Keyboard.JustDown(cursors.up) ||
        Phaser.Input.Keyboard.JustDown(cursors.space) ||
        Phaser.Input.Keyboard.JustDown(wasd.up);

      if (jumpPressed && canJump) {
        player.setVelocityY(JUMP_VEL);
        coyoteTimer = 0;
      }

      // ── Animation state (gated — don't override attack/kick) ─
      if (attackState === 'ready') {
        let moveAnim;
        if (isOnLadder) {
          moveAnim = player.body.velocity.y !== 0 ? 'climb' : 'idle';
        } else if (!onGround) {
          moveAnim = player.body.velocity.y < 0 ? 'jump' : 'fall';
        } else {
          moveAnim = player.body.velocity.x !== 0 ? 'run' : 'idle';
        }
        player.anims.play(moveAnim, true);
      }

      // ── G key — toggle physics hitbox overlay ─────────────
      if (Phaser.Input.Keyboard.JustDown(keyG)) {
        this.physics.world.drawDebug = !this.physics.world.drawDebug;
        if (!this.physics.world.drawDebug) {
          this.physics.world.debugGraphic.clear();
        }
      }

      // ── Debug overlay — updated every frame ───────────────
      const vx = Math.round(player.body.velocity.x);
      const vy = Math.round(player.body.velocity.y);
      const px = Math.round(player.x);
      const py = Math.round(player.y);
      const facing = player.flipX ? 'left' : 'right';

      // Derive display state string
      let stateStr;
      if (attackState === 'active') stateStr = attackIsKick ? 'kick' : 'attack';
      else if (attackState === 'cooldown') stateStr = 'cooldown';
      else if (isOnLadder) stateStr = 'ladder';
      else stateStr = !onGround ? (player.body.velocity.y < 0 ? 'jump' : 'fall')
        : player.body.velocity.x !== 0 ? 'run' : 'idle';

      debugText.setText(
        `state:    ${stateStr}\n` +
        `grounded: ${onGround ? 'yes' : 'no'}  ladder: ${isOnLadder ? 'yes' : 'no'}\n` +
        `vel:      x:${String(vx).padStart(5)}  y:${String(vy).padStart(5)}\n` +
        `pos:      x:${String(px).padStart(5)}  y:${String(py).padStart(5)}\n` +
        `facing:   ${facing}\n` +
        `lives:${playerLives}  coins:${coinCount}  gems:${gemCount}  keys:${keysCollected}/${totalKeys}\n` +
        `\n[J] attack  [K] kick  [G] hitboxes`
      );
    }

  </script>
